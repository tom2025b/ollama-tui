# Continuous Integration for the ai-suite Rust workspace.
# Runs formatting, lint, and test checks on every push to main and on pull requests.
name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-progress runs for the same ref when a new commit is pushed.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  ci:
    name: fmt + clippy + test
    runs-on: ubuntu-latest

    steps:
      # Pull the repository contents into the runner.
      - name: Checkout source
        uses: actions/checkout@v4

      # Install the latest stable Rust toolchain along with rustfmt and clippy.
      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # Cache the cargo registry, git db, and target directory keyed on Cargo.lock.
      - name: Cache cargo build artifacts
        uses: Swatinem/rust-cache@v2

      # Verify code is formatted according to rustfmt rules.
      - name: Check formatting
        run: cargo fmt --all -- --check

      # Lint all targets and fail the build on any warning.
      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      # Execute the full test suite.
      - name: Run tests
        run: cargo test --all-features --workspace
